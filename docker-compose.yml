services:
  postgres:
    image: postgres:16
    container_name: aftersales-pg
    environment:
      POSTGRES_USER: aftersales
      POSTGRES_PASSWORD: aftersales
      POSTGRES_DB: aftersales
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aftersales"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aftersales-api
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://aftersales:aftersales@postgres:5432/aftersales
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python -m app.seed.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aftersales-ui
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
